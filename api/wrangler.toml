name = "recipesaurus-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"
APP_URL = "https://recipesaurus.ai"

# Secrets:
# - RESEND_API_KEY - set via `wrangler secret put RESEND_API_KEY`
# - OPENAI_API_KEY - set via `wrangler secret put OPENAI_API_KEY`
# - OPENAI_MODEL - optional model override, defaults to gpt-5-mini
# - STRIPE_SECRET_KEY - set via `wrangler secret put STRIPE_SECRET_KEY`
# - STRIPE_WEBHOOK_SECRET - set via `wrangler secret put STRIPE_WEBHOOK_SECRET`
# - STRIPE_PRICE_ID - optional recurring Stripe Price id; defaults to inline $4.99/month pricing
# - ANALYTICS_READ_TOKEN - optional, protects GET /api/analytics/page-views when set
# - DISCORD_SIGNUP_WEBHOOK_URL - set via `wrangler secret put DISCORD_SIGNUP_WEBHOOK_URL`
# - DISCORD_FEEDBACK_WEBHOOK_URL - set via `wrangler secret put DISCORD_FEEDBACK_WEBHOOK_URL`

[[d1_databases]]
binding = "DB"
database_name = "recipesaurus-db"
database_id = "776cabf9-5a51-46fe-822c-1db6fc147ccd"
