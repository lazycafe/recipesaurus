name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm ci
        working-directory: api

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Typecheck API
        run: npx tsc --noEmit
        working-directory: api
