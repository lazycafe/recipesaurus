<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="46" fill="#4a7c59"/>

  <!-- Body -->
  <ellipse cx="55" cy="58" rx="26" ry="18" fill="#3d6649"/>

  <!-- Tail -->
  <path d="M 78 55 Q 88 52 90 58" fill="#3d6649"/>

  <!-- Tail spikes -->
  <ellipse cx="88" cy="48" rx="3" ry="6" fill="#3a5f44" transform="rotate(-25 88 48)"/>
  <ellipse cx="92" cy="56" rx="2.5" ry="5" fill="#3a5f44" transform="rotate(15 92 56)"/>

  <!-- Back plates -->
  <path d="M 38 46 L 44 32 L 50 46 L 44 52 Z" fill="#3a5f44"/>
  <path d="M 50 44 L 58 28 L 66 44 L 58 50 Z" fill="#3d6649"/>
  <path d="M 62 48 L 68 36 L 74 48 L 68 52 Z" fill="#3a5f44"/>

  <!-- Neck -->
  <ellipse cx="34" cy="52" rx="10" ry="12" fill="#3d6649"/>

  <!-- Head -->
  <ellipse cx="24" cy="46" rx="12" ry="10" fill="#3d6649"/>

  <!-- Snout -->
  <ellipse cx="16" cy="50" rx="7" ry="5" fill="#3a5f44"/>

  <!-- Eye white -->
  <ellipse cx="26" cy="44" rx="5" ry="6" fill="white"/>

  <!-- Pupil -->
  <circle cx="27" cy="43" r="3" fill="#1a1a1a"/>

  <!-- Eye shine -->
  <circle cx="28" cy="41.5" r="1.2" fill="white"/>

  <!-- Smile -->
  <path d="M 14 54 Q 18 57 22 55" fill="none" stroke="#2d4a36" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Legs -->
  <ellipse cx="42" cy="74" rx="6" ry="8" fill="#3a5f44"/>
  <ellipse cx="66" cy="72" rx="7" ry="10" fill="#3a5f44"/>
</svg>
